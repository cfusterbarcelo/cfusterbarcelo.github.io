<!DOCTYPE html>
<html>
<head>
  <title>Talk map</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.0.0-beta.2/leaflet.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.0.0-beta.2/leaflet.js"></script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ '/talkmap/leaflet_dist/screen.css' | relative_url }}" />

  <link rel="stylesheet" href="{{ '/talkmap/leaflet_dist/MarkerCluster.css' | relative_url }}" />
  <link rel="stylesheet" href="{{ '/talkmap/leaflet_dist/MarkerCluster.Default.css' | relative_url }}" />
  <script src="{{ '/talkmap/leaflet_dist/leaflet.markercluster-src.js' | relative_url }}"></script>
</head>
<body>
  <div id="map"></div>
  <span>Markers are generated from the entries in <code>_talks</code>.</span>
  <script type="text/javascript">
    var addressPoints = [
      {% assign sorted_talks = site.talks | sort: "date" | reverse %}
      {% assign first_point = true %}
      {% for post in sorted_talks %}
        {% assign lookup_location = post.map_location | default: post.location %}
        {% assign match = site.data.map_locations | where: "name", lookup_location | first %}
        {% if match %}
          {% assign popup_url = post.url | relative_url %}
          {% unless first_point %},{% endunless %}
          [
            {{ post.title | jsonify }},
            {{ "<a href='" | append: popup_url | append: "' target='_top'>" | append: post.title | append: "</a><br><small>" | append: post.venue | append: " · " | append: lookup_location | append: "</small>" | jsonify }},
            {{ match.latitude }},
            {{ match.longitude }}
          ]
          {% assign first_point = false %}
        {% endif %}
      {% endfor %}
    ];

    var tiles = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
      maxZoom: 18,
      attribution: 'Tiles &copy; Esri &mdash; Source: Esri, DeLorme, NAVTEQ, USGS, Intermap, iPC, NRCAN, Esri Japan, METI, Esri China (Hong Kong), Esri (Thailand), TomTom, 2012'
    });
    var latlng = L.latLng(30, 10);
    var map = L.map('map', { center: latlng, zoom: 0.7, layers: [tiles] });
    var markers = L.markerClusterGroup({
      showCoverageOnHover: false,
      maxClusterRadius: 80
    });

    for (var i = 0; i < addressPoints.length; i++) {
      var a = addressPoints[i];
      var marker = L.marker(new L.LatLng(a[2], a[3]), { title: a[0] });
      marker.bindPopup(a[1]);
      markers.addLayer(marker);
    }

    map.addLayer(markers);
    if (addressPoints.length > 0) {
      map.fitBounds(markers.getBounds().pad(0.2));
    } else {
      map.zoomIn();
    }
  </script>
</body>
</html>
